name: dockerhub
on:
  push:
    branches: [main]
  
jobs:
    build:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout repository
          uses: actions/checkout@v3

        - name: login to Docker Hub
          uses: docker/login-action@v2
          with:
            username: ${{ secrets.DOCKER_USERNAME }}
            password: ${{ secrets.DOCKER_PASSWORD }}
        - name: Build Docker image Frontend
          run: docker compose  build -t ${{ secrets.DOCKER_USERNAME }}/frontend:latest ./frontend
        - name: Build Docker image Backend
          run: docker compose build -t ${{ secrets.DOCKER_USERNAME }}/flask-api:latest ./backend
        - name: Push Docker image Frontend
          run: docker compose push ${{ secrets.DOCKER_USERNAME }}/frontend:latest
        - name: Push Docker image Backend
          run: docker compose push ${{ secrets.DOCKER_USERNAME }}/flask-api:latest
            
            