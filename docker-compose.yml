services:
  backend:
    build: ./backend
    image: adamta12/flask-api:latest
    ports:
      - "5000:5000"
    encvironment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=flaskdb
    depends_on:
      - db

  frontend:
    build: ./frontend
    image: adamta12/frontend-app:latest
    ports:
      - "3000:80"
    depends-on:
      - backend

  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: flaskdb
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3307:3306"